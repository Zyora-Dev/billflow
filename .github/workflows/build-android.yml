name: Build Android (APK + AAB)

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'What to build'
        required: true
        default: 'apk'
        type: choice
        options:
          - apk
          - aab
          - both

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Expo prebuild (Android)
        run: npx expo prebuild --platform android --clean --no-install

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/release.keystore
          ls -la android/app/release.keystore

      - name: Verify keystore secrets BEFORE long build
        env:
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -e
          echo "Step 1: open keystore with store password"
          keytool -list -keystore android/app/release.keystore -storepass "$STORE_PASSWORD" >/dev/null
          echo "Step 2: read the private key with key password"
          keytool -exportcert -keystore android/app/release.keystore -alias "$KEY_ALIAS" -storepass "$STORE_PASSWORD" -keypass "$KEY_PASSWORD" -file /tmp/cert.der >/dev/null
          echo "✓ All keystore secrets verified end-to-end"

      - name: Configure signing
        env:
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          {
            echo "MYAPP_RELEASE_STORE_FILE=release.keystore"
            echo "MYAPP_RELEASE_KEY_ALIAS=$KEY_ALIAS"
            echo "MYAPP_RELEASE_STORE_PASSWORD=$STORE_PASSWORD"
            echo "MYAPP_RELEASE_KEY_PASSWORD=$KEY_PASSWORD"
          } >> android/gradle.properties

      - name: Patch build.gradle for release signing
        run: |
          python3 - <<'PY'
          import re, pathlib
          p = pathlib.Path("android/app/build.gradle")
          src = p.read_text()
          if "MYAPP_RELEASE_STORE_FILE" not in src:
              release_block = (
                  "\n            release {\n"
                  "                if (project.hasProperty(\"MYAPP_RELEASE_STORE_FILE\")) {\n"
                  "                    storeFile file(MYAPP_RELEASE_STORE_FILE)\n"
                  "                    storePassword MYAPP_RELEASE_STORE_PASSWORD\n"
                  "                    keyAlias MYAPP_RELEASE_KEY_ALIAS\n"
                  "                    keyPassword MYAPP_RELEASE_KEY_PASSWORD\n"
                  "                }\n"
                  "            }\n"
              )
              src = re.sub(r"(signingConfigs\s*\{)", r"\1" + release_block, src, count=1)
          src = src.replace("signingConfig signingConfigs.debug", "signingConfig signingConfigs.release")
          p.write_text(src)
          print("--- patched build.gradle ---")
          print(src)
          PY

      - name: Build APK
        if: ${{ inputs.build_type == 'apk' || inputs.build_type == 'both' }}
        run: cd android && ./gradlew assembleRelease --no-daemon

      - name: Build AAB
        if: ${{ inputs.build_type == 'aab' || inputs.build_type == 'both' }}
        run: cd android && ./gradlew bundleRelease --no-daemon

      - name: Upload APK artifact
        if: ${{ inputs.build_type == 'apk' || inputs.build_type == 'both' }}
        uses: actions/upload-artifact@v4
        with:
          name: billflow-apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Upload AAB artifact
        if: ${{ inputs.build_type == 'aab' || inputs.build_type == 'both' }}
        uses: actions/upload-artifact@v4
        with:
          name: billflow-aab
          path: android/app/build/outputs/bundle/release/*.aab
          retention-days: 30
