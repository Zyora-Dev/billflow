name: Build Android (APK + AAB)

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'What to build'
        required: true
        default: 'apk'
        type: choice
        options:
          - apk
          - aab
          - both

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          mkdir -p android/app
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/release.keystore
        shell: bash

      - name: Expo prebuild (Android)
        run: npx expo prebuild --platform android --clean --no-install

      - name: Configure signing
        env:
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cat >> android/gradle.properties <<EOF
          MYAPP_RELEASE_STORE_FILE=release.keystore
          MYAPP_RELEASE_KEY_ALIAS=$KEY_ALIAS
          MYAPP_RELEASE_STORE_PASSWORD=$STORE_PASSWORD
          MYAPP_RELEASE_KEY_PASSWORD=$KEY_PASSWORD
          EOF

      - name: Patch build.gradle for release signing
        run: |
          GRADLE_FILE=android/app/build.gradle
          if ! grep -q "MYAPP_RELEASE_STORE_FILE" $GRADLE_FILE; then
            sed -i '/signingConfigs {/a\
                release {\
                    if (project.hasProperty("MYAPP_RELEASE_STORE_FILE")) {\
                        storeFile file(MYAPP_RELEASE_STORE_FILE)\
                        storePassword MYAPP_RELEASE_STORE_PASSWORD\
                        keyAlias MYAPP_RELEASE_KEY_ALIAS\
                        keyPassword MYAPP_RELEASE_KEY_PASSWORD\
                    }\
                }
' $GRADLE_FILE
          fi
          sed -i 's/signingConfig signingConfigs.debug/signingConfig signingConfigs.release/' $GRADLE_FILE

      - name: Build APK
        if: ${{ inputs.build_type == 'apk' || inputs.build_type == 'both' }}
        run: cd android && ./gradlew assembleRelease --no-daemon

      - name: Build AAB
        if: ${{ inputs.build_type == 'aab' || inputs.build_type == 'both' }}
        run: cd android && ./gradlew bundleRelease --no-daemon

      - name: Upload APK artifact
        if: ${{ inputs.build_type == 'apk' || inputs.build_type == 'both' }}
        uses: actions/upload-artifact@v4
        with:
          name: billflow-apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Upload AAB artifact
        if: ${{ inputs.build_type == 'aab' || inputs.build_type == 'both' }}
        uses: actions/upload-artifact@v4
        with:
          name: billflow-aab
          path: android/app/build/outputs/bundle/release/*.aab
          retention-days: 30
