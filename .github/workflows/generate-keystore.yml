name: Generate Android Keystore (run ONCE)

on:
  workflow_dispatch:
    inputs:
      key_alias:
        description: 'Key alias'
        required: true
        default: 'billflow'
      common_name:
        description: 'CN (your name/org)'
        required: true
        default: 'Spectra Technologies'
      org_unit:
        description: 'OU'
        required: true
        default: 'BillFlow'
      org:
        description: 'O'
        required: true
        default: 'Spectra'
      city:
        description: 'L (city)'
        required: true
        default: 'Nagercoil'
      state:
        description: 'ST (state)'
        required: true
        default: 'Tamil Nadu'
      country:
        description: 'C (country code)'
        required: true
        default: 'IN'

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Generate random passwords
        id: pwd
        run: |
          STORE_PWD=$(openssl rand -base64 24 | tr -d '=+/' | cut -c1-20)
          KEY_PWD=$(openssl rand -base64 24 | tr -d '=+/' | cut -c1-20)
          echo "::add-mask::$STORE_PWD"
          echo "::add-mask::$KEY_PWD"
          echo "store_pwd=$STORE_PWD" >> $GITHUB_OUTPUT
          echo "key_pwd=$KEY_PWD" >> $GITHUB_OUTPUT

      - name: Generate keystore
        env:
          STORE_PWD: ${{ steps.pwd.outputs.store_pwd }}
          KEY_PWD: ${{ steps.pwd.outputs.key_pwd }}
        run: |
          keytool -genkeypair -v \
            -keystore release.keystore \
            -alias "${{ inputs.key_alias }}" \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "$STORE_PWD" \
            -keypass "$KEY_PWD" \
            -dname "CN=${{ inputs.common_name }}, OU=${{ inputs.org_unit }}, O=${{ inputs.org }}, L=${{ inputs.city }}, ST=${{ inputs.state }}, C=${{ inputs.country }}"

      - name: Encode keystore + write secrets file
        env:
          STORE_PWD: ${{ steps.pwd.outputs.store_pwd }}
          KEY_PWD: ${{ steps.pwd.outputs.key_pwd }}
        run: |
          base64 -w0 release.keystore > keystore.base64
          cat > SECRETS.txt <<EOF
          ============================================================
          BILLFLOW ANDROID KEYSTORE — SAVE IMMEDIATELY
          ============================================================

          CRITICAL: Losing these = you can NEVER update the app
          on Google Play Store again. Back up to multiple places.

          Add as repo secrets:
          https://github.com/Zyora-Dev/billflow/settings/secrets/actions

          1. ANDROID_KEYSTORE_BASE64
             (paste contents of keystore.base64)

          2. ANDROID_KEY_ALIAS
             ${{ inputs.key_alias }}

          3. ANDROID_STORE_PASSWORD
             $STORE_PWD

          4. ANDROID_KEY_PASSWORD
             $KEY_PWD

          ============================================================
          AFTER ADDING SECRETS:
          1. Save release.keystore to safe location (NOT git)
          2. Save SECRETS.txt to password manager
          3. DELETE this workflow run from Actions tab
          ============================================================
          EOF

      - name: Upload keystore + secrets
        uses: actions/upload-artifact@v4
        with:
          name: android-keystore
          path: |
            release.keystore
            keystore.base64
            SECRETS.txt
          retention-days: 1
