name: Generate Android Keystore (run ONCE)

on:
  workflow_dispatch:
    inputs:
      key_alias:
        description: 'Key alias'
        required: true
        default: 'billflow'
      common_name:
        description: 'CN (your name/org)'
        required: true
        default: 'Spectra Technologies'
      org_unit:
        description: 'OU'
        required: true
        default: 'BillFlow'
      org:
        description: 'O'
        required: true
        default: 'Spectra'
      city:
        description: 'L (city)'
        required: true
        default: 'Nagercoil'
      state:
        description: 'ST (state)'
        required: true
        default: 'Tamil Nadu'
      country:
        description: 'C (country code)'
        required: true
        default: 'IN'

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Generate single password
        id: pwd
        run: |
          PWD=$(openssl rand -base64 24 | tr -d '=+/' | cut -c1-20)
          echo "::add-mask::$PWD"
          echo "pwd=$PWD" >> $GITHUB_OUTPUT

      - name: Generate keystore (same password for store + key)
        env:
          PWD: ${{ steps.pwd.outputs.pwd }}
        run: |
          keytool -genkeypair -v \
            -keystore release.keystore \
            -alias "${{ inputs.key_alias }}" \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "$PWD" \
            -keypass "$PWD" \
            -dname "CN=${{ inputs.common_name }}, OU=${{ inputs.org_unit }}, O=${{ inputs.org }}, L=${{ inputs.city }}, ST=${{ inputs.state }}, C=${{ inputs.country }}"
          # Verify the key can actually be read (not just listed)
          keytool -exportcert -keystore release.keystore -alias "${{ inputs.key_alias }}" -storepass "$PWD" -keypass "$PWD" -file /tmp/cert.der && echo "✓ Keystore verified end-to-end"

      - name: Encode keystore + write secret files
        env:
          PWD: ${{ steps.pwd.outputs.pwd }}
        run: |
          base64 -w0 release.keystore > keystore.base64
          printf '%s' "${{ inputs.key_alias }}" > ANDROID_KEY_ALIAS.txt
          printf '%s' "$PWD" > ANDROID_STORE_PASSWORD.txt
          printf '%s' "$PWD" > ANDROID_KEY_PASSWORD.txt
          cat > README.txt <<'EOF'
          ============================================================
          BILLFLOW ANDROID KEYSTORE
          ============================================================

          Single password is used for both store + key (industry default).
          ANDROID_STORE_PASSWORD and ANDROID_KEY_PASSWORD have the SAME value.

          Add 4 secrets at:
          https://github.com/Zyora-Dev/billflow/settings/secrets/actions

          File                              -> Secret name
          --------------------------------------------------------
          keystore.base64                   -> ANDROID_KEYSTORE_BASE64
          ANDROID_KEY_ALIAS.txt             -> ANDROID_KEY_ALIAS
          ANDROID_STORE_PASSWORD.txt        -> ANDROID_STORE_PASSWORD
          ANDROID_KEY_PASSWORD.txt          -> ANDROID_KEY_PASSWORD

          Easiest copy method (Mac terminal):
            cd ~/Downloads/android-keystore
            cat keystore.base64 | pbcopy            # paste into ANDROID_KEYSTORE_BASE64
            cat ANDROID_KEY_ALIAS.txt | pbcopy      # paste into ANDROID_KEY_ALIAS
            cat ANDROID_STORE_PASSWORD.txt | pbcopy # paste into ANDROID_STORE_PASSWORD
            cat ANDROID_KEY_PASSWORD.txt | pbcopy   # paste into ANDROID_KEY_PASSWORD

          ⚠️  CRITICAL — back up release.keystore to a safe place.
              Losing it = you can never update the Play Store app.
          ============================================================
          EOF

      - name: Upload keystore + secrets
        uses: actions/upload-artifact@v4
        with:
          name: android-keystore
          path: |
            release.keystore
            keystore.base64
            ANDROID_KEY_ALIAS.txt
            ANDROID_STORE_PASSWORD.txt
            ANDROID_KEY_PASSWORD.txt
            README.txt
          retention-days: 1
