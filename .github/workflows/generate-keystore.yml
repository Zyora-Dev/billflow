name: Generate Android Keystore (run ONCE)

on:
  workflow_dispatch:
    inputs:
      key_alias:
        description: 'Key alias'
        required: true
        default: 'billflow'
      common_name:
        description: 'CN (your name/org)'
        required: true
        default: 'Spectra Technologies'
      org_unit:
        description: 'OU'
        required: true
        default: 'BillFlow'
      org:
        description: 'O'
        required: true
        default: 'Spectra'
      city:
        description: 'L (city)'
        required: true
        default: 'Nagercoil'
      state:
        description: 'ST (state)'
        required: true
        default: 'Tamil Nadu'
      country:
        description: 'C (country code)'
        required: true
        default: 'IN'

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Generate random passwords
        id: pwd
        run: |
          STORE_PWD=$(openssl rand -base64 24 | tr -d '=+/' | cut -c1-20)
          KEY_PWD=$(openssl rand -base64 24 | tr -d '=+/' | cut -c1-20)
          echo "::add-mask::$STORE_PWD"
          echo "::add-mask::$KEY_PWD"
          echo "store_pwd=$STORE_PWD" >> $GITHUB_OUTPUT
          echo "key_pwd=$KEY_PWD" >> $GITHUB_OUTPUT

      - name: Generate keystore
        env:
          STORE_PWD: ${{ steps.pwd.outputs.store_pwd }}
          KEY_PWD: ${{ steps.pwd.outputs.key_pwd }}
        run: |
          keytool -genkeypair -v \
            -keystore release.keystore \
            -alias "${{ inputs.key_alias }}" \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "$STORE_PWD" \
            -keypass "$KEY_PWD" \
            -dname "CN=${{ inputs.common_name }}, OU=${{ inputs.org_unit }}, O=${{ inputs.org }}, L=${{ inputs.city }}, ST=${{ inputs.state }}, C=${{ inputs.country }}"

      - name: Encode keystore + write secrets file
        env:
          STORE_PWD: ${{ steps.pwd.outputs.store_pwd }}
          KEY_PWD: ${{ steps.pwd.outputs.key_pwd }}
        run: |
          base64 -w0 release.keystore > keystore.base64
          # Write each secret to its own file for easy copy (no formatting confusion)
          printf '%s' "${{ inputs.key_alias }}" > ANDROID_KEY_ALIAS.txt
          printf '%s' "$STORE_PWD" > ANDROID_STORE_PASSWORD.txt
          printf '%s' "$KEY_PWD" > ANDROID_KEY_PASSWORD.txt
          # Verify keystore can be opened with these passwords
          keytool -list -keystore release.keystore -storepass "$STORE_PWD" -alias "${{ inputs.key_alias }}" >/dev/null && echo "✓ Keystore verified"
          cat > README.txt <<'EOF'
          ============================================================
          BILLFLOW ANDROID KEYSTORE — DO THIS NOW
          ============================================================

          Each secret is in its own file. Copy the FULL CONTENTS of
          each file (no extra spaces/newlines) and paste into the
          matching GitHub secret name.

          Add 4 secrets at:
          https://github.com/Zyora-Dev/billflow/settings/secrets/actions

          File                              -> Secret name
          --------------------------------------------------------
          keystore.base64                   -> ANDROID_KEYSTORE_BASE64
          ANDROID_KEY_ALIAS.txt             -> ANDROID_KEY_ALIAS
          ANDROID_STORE_PASSWORD.txt        -> ANDROID_STORE_PASSWORD
          ANDROID_KEY_PASSWORD.txt          -> ANDROID_KEY_PASSWORD

          ⚠️  CRITICAL — back up release.keystore to a safe place.
              Losing it = you can never update the Play Store app.
          ============================================================
          EOF

      - name: Upload keystore + secrets
        uses: actions/upload-artifact@v4
        with:
          name: android-keystore
          path: |
            release.keystore
            keystore.base64
            ANDROID_KEY_ALIAS.txt
            ANDROID_STORE_PASSWORD.txt
            ANDROID_KEY_PASSWORD.txt
            README.txt
          retention-days: 1
